kind = "web"
previewPath = "/"
title = "JEE Study Tracker"
version = "1.0.0"
id = "artifacts/jee-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24028

[services.development]
run = "pnpm --filter @workspace/jee-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jee-tracker", "run", "build" ]
publicDir = "artifacts/jee-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24028"
BASE_PATH = "/"
